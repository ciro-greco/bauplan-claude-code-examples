name: Bauplan PR checks

# Runs the pipeline + data-quality expectations on the Bauplan data branch declared
# in conversion-pipeline/.bauplan-branch, then posts (or updates) a PR comment with the
# data produced and the diff vs `main`. This is the "audit" half of write-audit-publish:
# a failing quality gate turns this check red, so branch protection can block the merge.

on:
  pull_request:
    branches: [main]
    paths:
      - 'conversion-pipeline/**'
      - '.github/workflows/bauplan-ci.yml'

# Serialize per-PR so repeated pushes don't materialize the shared data branch at once.
concurrency:
  group: bauplan-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bauplan
        run: pip install --quiet --upgrade bauplan

      - name: Configure bauplan credentials
        env:
          BAUPLAN_API_KEY: ${{ secrets.BAUPLAN_API_KEY }}
        run: |
          if [ -z "$BAUPLAN_API_KEY" ]; then
            echo "::error::BAUPLAN_API_KEY secret is not set. Add it in Settings → Secrets and variables → Actions (see conversion-pipeline/README.md)."
            exit 1
          fi
          bauplan config set api_key "$BAUPLAN_API_KEY"

      - name: Resolve data branch
        id: br
        run: echo "branch=$(tr -d '[:space:]' < conversion-pipeline/.bauplan-branch)" >> "$GITHUB_OUTPUT"

      - name: Point CLI at the data branch
        run: bauplan checkout "${{ steps.br.outputs.branch }}"

      - name: Run pipeline + quality gates (strict)
        working-directory: conversion-pipeline
        run: bauplan run --strict on

      - name: Build PR comment (data summary + diff)
        run: |
          {
            echo "<!-- bauplan-data-summary -->"
            python conversion-pipeline/ci/summarize.py "${{ steps.br.outputs.branch }}"
            echo ""
            echo "<details><summary>Diff vs <code>main</code> (what merging publishes)</summary>"
            echo ""
            echo '```'
            bauplan branch diff main 2>&1 || true
            echo '```'
            echo "</details>"
            echo ""
            echo "_Quality gate passed ✅ · merging this PR publishes the tables above to \`main\`._"
          } > "$RUNNER_TEMP/comment.md"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/comment.md', 'utf8');
            const marker = '<!-- bauplan-data-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
