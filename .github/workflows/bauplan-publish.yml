name: Bauplan publish on merge

# The "publish" half of write-audit-publish. When a PR that carries a pipeline manifest is
# MERGED into `main`, this promotes the reviewed Bauplan data branch by running
# `bauplan branch merge` into `main`. Generic: reads the branch from .bauplan/pr.env.
# Approval can be enforced upstream with branch protection (require review before merge).

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - '.bauplan/**'
      - 'conversion-pipeline/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Load pipeline manifest
        id: m
        run: |
          if [ ! -f .bauplan/pr.env ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"
          while IFS='=' read -r k v; do
            case "$k" in ''|\#*) continue;; esac
            echo "$k=$v" >> "$GITHUB_OUTPUT"
          done < .bauplan/pr.env

      - uses: actions/setup-python@v5
        if: steps.m.outputs.present == 'true'
        with:
          python-version: '3.11'

      - name: Install bauplan
        if: steps.m.outputs.present == 'true'
        run: pip install --quiet --upgrade bauplan

      - name: Configure bauplan credentials
        if: steps.m.outputs.present == 'true'
        env:
          BAUPLAN_API_KEY: ${{ secrets.BAUPLAN_API_KEY }}
        run: |
          if [ -z "$BAUPLAN_API_KEY" ]; then
            echo "::error::BAUPLAN_API_KEY secret is not set."
            exit 1
          fi
          bauplan config set api_key "$BAUPLAN_API_KEY"

      - name: Audit diff before publish
        if: steps.m.outputs.present == 'true'
        run: |
          bauplan checkout "${{ steps.m.outputs.BAUPLAN_BRANCH }}"
          echo "Publishing '${{ steps.m.outputs.BAUPLAN_BRANCH }}' -> main:"
          bauplan branch diff main 2>&1 || true

      - name: Merge data branch into main
        if: steps.m.outputs.present == 'true'
        run: |
          bauplan checkout main
          bauplan branch merge "${{ steps.m.outputs.BAUPLAN_BRANCH }}" \
            --commit-message "Publish via PR #${{ github.event.pull_request.number }}"

      - name: Comment result on PR
        if: steps.m.outputs.present == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Published data branch \`${{ steps.m.outputs.BAUPLAN_BRANCH }}\` to \`main\` in Bauplan.`,
            });

      - name: Clean up data branch
        if: steps.m.outputs.present == 'true'
        run: bauplan branch rm "${{ steps.m.outputs.BAUPLAN_BRANCH }}" --if-exists || true
